<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Trabalho 2º Bimestre</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Trabalho 2º Bimestre De Desenvolvimento Para Internet</h1>

    <!-- Exercício 1 -->
    <section>
        <h2>1. Encontre o Triângulo</h2>

        <input id="lado1" type="number" placeholder="Lado X">
        <input id="lado2" type="number" placeholder="Lado Y">
        <input id="lado3" type="number" placeholder="Lado Z">

        <button onclick="verificarTriangulo()">Verificar</button>

        <p id="resultadoTriangulo"></p>
    </section>

    <!-- Exercício 2 -->
    <section>
        <h2>2. Calculadora IMC</h2>

        <input id="peso" type="number" placeholder="Peso">
        <input id="altura" type="number" placeholder="Altura">

        <button onclick="calcularIMC()">Calcular</button>

        <p id="resultadoIMC"></p>
    </section>

    <!-- Exercício 3 -->
    <section>
        <h2>3. Calculadora de Impostos</h2>

        <input id="ano" type="number" placeholder="Ano do carro">
        <input id="valorCarro" type="number" placeholder="Valor do carro">

        <button onclick="calcularImposto()">Calcular</button>

        <p id="resultadoImposto"></p>
    </section>

    <!-- Exercício 4 -->
    <section>
        <h2>4. Calculadora de Salário</h2>

        <input id="salario" type="number" placeholder="Salário">
        <input id="codigo" type="number" placeholder="Código">

        <button onclick="calcularSalario()">Calcular</button>

        <p id="resultadoSalario"></p>
    </section>

    <script src="script.js"></script>

</body>
</html>
